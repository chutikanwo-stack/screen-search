<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screen Search</title>
</head>

<body style="font-family:sans-serif;text-align:center;margin-top:80px;">

<h2>Search Screen Code</h2>

<input id="codeInput" placeholder="Enter Code">
<button onclick="searchCode()">Search</button>

<div id="result" style="margin-top:30px;"></div>

<script>

function searchCode(){

let code = document.getElementById("codeInput").value;

fetch("https://pb-n8n.planbmedia.co.th/webhook/search-screen?code=" + code)

.then(res => res.json())

.then(data => {

if(data.length == 0){
document.getElementById("result").innerHTML = "Data not found";
return;
}

let d = data[0];

document.getElementById("result").innerHTML = `
Code : ${d.CodeDGT}<br>
Name : ${d["ชื่อจอในAppendix"]}<br>
Type : ${d.TypeScreens}<br>
Format : ${d.Format3}<br>
Pixel : ${d.Pixel}<br>
Width : ${d["กว้าง(m)"]}<br>
Height : ${d["สูง(m)"]}
`;

})

.catch(err=>{
document.getElementById("result").innerHTML = "Error connecting API";
});

}

</script>

</body>
</html>
