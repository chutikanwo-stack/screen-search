<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Screen Search</title>

<style>

body{
background:#0b3d91;
font-family:sans-serif;
text-align:center;
margin-top:100px;
color:white;
}

input{
padding:14px 20px;
width:260px;
border-radius:50px;
border:none;
font-size:16px;
outline:none;
}

button{
padding:14px 28px;
border-radius:50px;
border:none;
background:white;
color:#0b3d91;
font-weight:bold;
cursor:pointer;
margin-left:10px;
}

#result{
margin-top:40px;
background:white;
color:black;
display:inline-block;
padding:25px;
border-radius:12px;
text-align:left;
min-width:320px;
}

</style>

</head>


<body>

<h2>Search Screen Code</h2>

<input id="codeInput" placeholder="Enter Screen Code">
<button onclick="searchCode()">Search</button>

<div id="result"></div>


<script>

function searchCode(){

let code = document.getElementById("codeInput").value;

fetch("https://pb-n8n.planbmedia.co.th/webhook/search-screen?code=" + code)

.then(response => response.json())

.then(data => {

let d = data[0];

document.getElementById("result").innerHTML = `
<b>Code :</b> ${d.CodeDGT}<br><br>
<b>Location :</b> ${d["ชื่อจอในAppendix"]}<br>
<b>Area :</b> ${d.Area}<br>
<b>Type :</b> ${d.TypeScreens}<br>
<b>Format :</b> ${d.Format3}<br>
<b>Pixel :</b> ${d.Pixel}<br>
<b>Width :</b> ${d["กว้าง(m)"]} m<br>
<b>Height :</b> ${d["สูง(m)"]} m<br>
<b>Full :</b> ${d.Full}
`;

})

.catch(error => {

document.getElementById("result").innerHTML = "Data not found";

});

}

</script>

</body>
</html>
