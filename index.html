<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screen Search</title>

<style>

body{
font-family:sans-serif;
text-align:center;
margin-top:120px;
background:linear-gradient(135deg,#0f4c81,#1c7ed6);
color:white;
}

h2{
font-size:32px;
margin-bottom:30px;
}

.searchBox{
display:flex;
justify-content:center;
gap:10px;
}

#codeInput{
padding:14px 25px;
border:none;
border-radius:40px;
width:260px;
font-size:16px;
outline:none;
}

button{
padding:14px 28px;
border:none;
border-radius:40px;
background:white;
color:#0f4c81;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#e7f1ff;
}

#result{
margin-top:30px;
background:white;
color:#333;
display:inline-block;
padding:20px 30px;
border-radius:12px;
min-width:260px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

</style>
</head>

<body>

<h2>Search Screen Code</h2>

<div class="searchBox">
<input id="codeInput" placeholder="Enter Screen Code">
<button onclick="searchCode()">Search</button>
</div>

<div id="result"></div>

<script>

function searchCode(){

let code = document.getElementById("codeInput").value;

fetch("https://pb-n8n.planbmedia.co.th/webhook/search-screen?code=" + code,{
method:"GET",
mode:"cors"
})

.then(res => res.json())
.then(data => {

document.getElementById("result").innerHTML = `
<b>Code :</b> ${data.CodeDGT}<br>
<b>Area :</b> ${data.Area}<br>
<b>Pixel :</b> ${data.Pixel}<br>
<b>Width :</b> ${data["กว้าง(m)"]}<br>
<b>Height :</b> ${data["สูง(m)"]}
`;

})

.catch(err=>{
document.getElementById("result").innerHTML = "Data not found";
});

}

</script>

</body>
</html>
