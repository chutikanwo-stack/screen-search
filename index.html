<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screen Search</title>

<style>

body{
background:#0b3d91;
font-family:sans-serif;
text-align:center;
margin-top:100px;
color:white;
}

input{
padding:12px 20px;
border-radius:30px;
border:none;
width:220px;
font-size:16px;
}

button{
padding:12px 25px;
border-radius:30px;
border:none;
background:white;
color:#0b3d91;
font-weight:bold;
cursor:pointer;
margin-left:10px;
}

#result{
margin-top:30px;
background:white;
color:black;
display:inline-block;
padding:20px;
border-radius:12px;
text-align:left;
}

</style>

</head>

<body>

<h2>Search Screen Code</h2>

<input id="codeInput" placeholder="Enter Screen Code">
<button onclick="searchCode()">Search</button>

<div id="result"></div>

<script>

function searchCode(){

let code = document.getElementById("codeInput").value;

fetch("https://pb-n8n.planbmedia.co.th/webhook/search-screen?code=" + code,{
method:"GET",
mode:"cors"
})

.then(res => res.json())
.then(data => {

let d = data[0];

document.getElementById("result").innerHTML = `
<b>Code DGT :</b> ${d.CodeDGT}<br>
<b>Code Hello :</b> ${d.CodeHello}<br>
<b>ชื่อจอ :</b> ${d["ชื่อจอในAppendix"]}<br>
<b>Area :</b> ${d.Area}<br>
<b>เส้นถนน :</b> ${d["เส้นถนนรับการมอง"]}<br>
<b>Type :</b> ${d.TypeScreens}<br>
<b>Format :</b> ${d.Format3}<br>
<b>Pixel :</b> ${d.Pixel}<br>
<b>Width :</b> ${d["กว้าง(m)"]} m<br>
<b>Height :</b> ${d["สูง(m)"]} m<br>
<b>Area (sqm) :</b> ${d["ตร.ม."]}<br>
<b>Full :</b> ${d.Full}
`;

})

.catch(err=>{
document.getElementById("result").innerHTML = "Data not found";
});

}

</script>

</body>
</html>
