<script>

var API="https://pb-n8n.planbmedia.co.th/webhook/search-screen";

function doSearch(){

var q=document.getElementById("q").value.trim();

fetch(API+"?code="+encodeURIComponent(q))

.then(r=>r.json())

.then(data=>{

var results=data.results||data;

render(results);

})

.catch(err=>{

document.getElementById("results").innerHTML="Search error";

});

}



function render(data){

if(!data||!data.length){

document.getElementById("results").innerHTML="No results";

return;

}



var html="<div class='grid'>";



data.forEach(function(item){

html+=`

<div class="card">

<div class="card-title">${item["ชื่อสื่อAppendix"] || "-"}</div>

<div class="field"><span class="fl">Code</span><span class="fv">${item.CodeDGT || "-"}</span></div>

<div class="field"><span class="fl">Area</span><span class="fv">${item.Area || "-"}</span></div>

<div class="field"><span class="fl">Screen Type</span><span class="fv">${item["ประเภทหน้าจอ"] || "-"}</span></div>

<div class="field"><span class="fl">Coverage</span><span class="fv">${item.TypeScreens || "-"}</span></div>

<div class="field"><span class="fl">Format</span><span class="fv">${item.Format3 || "-"}</span></div>

<div class="field"><span class="fl">Pixel</span><span class="fv">${item.Pixel || "-"}</span></div>

<div class="field"><span class="fl">Width (m)</span><span class="fv">${item["กว้าง(m)"] || "-"}</span></div>

<div class="field"><span class="fl">Height (m)</span><span class="fv">${item["สูง(m)"] || "-"}</span></div>

</div>

`;

});



html+="</div>";

document.getElementById("results").innerHTML=html;

}



document.getElementById("q").addEventListener("keydown",function(e){

if(e.key==="Enter") doSearch();

});

</script>
