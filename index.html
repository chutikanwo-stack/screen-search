<script>
function searchCode(){

let code = document.getElementById("codeInput").value;

if(!code){
document.getElementById("result").innerHTML = "Please enter screen code";
return;
}

fetch("https://pb-n8n.planbmedia.co.th/webhook/search-screen?code=" + code,{
method:"GET",
mode:"cors"
})

.then(res => res.json())
.then(data => {

let d = data[0];

document.getElementById("result").innerHTML = `
Code : ${d.CodeDGT}<br>
Name : ${d["ชื่อสินจอในAppendix"]}<br>
Type : ${d.TypeScreens}<br>
Format : ${d.Format3}<br>
Pixel : ${d.Pixel}<br>
Width : ${d["กว้าง(m)"]}<br>
Height : ${d["สูง(m)"]}
`;

})

.catch(err=>{
document.getElementById("result").innerHTML = "Data not found";
});

}
</script>
