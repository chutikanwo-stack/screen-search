<div style="text-align:center;">
<h2>Search Screen Code</h2>

<input id="codeInput" placeholder="Enter Screen Code">
<button onclick="searchCode()">Search</button>

<div id="result" style="margin-top:20px;"></div>
</div>

<script>
function searchCode(){

let code = document.getElementById("codeInput").value;

fetch("https://pb-n8n.planbmedia.co.th/webhook/search-screen?code=" + code)
.then(res => res.json())
.then(data => {

let screen = data[0];

document.getElementById("result").innerHTML = `
Code : ${screen.CodeDGT}<br>
Screen Name : ${screen["ชื่อจอในAppendix"]}<br>
Area : ${screen.Area}<br>
Type : ${screen.TypeScreens}<br>
Format : ${screen.Format3}<br>
Pixel : ${screen.Pixel}<br>
Width : ${screen["กว้าง(m)"]} m<br>
Height : ${screen["สูง(m)"]} m
`;

})
.catch(err=>{
document.getElementById("result").innerHTML = "Data not found";
});

}
</script>
