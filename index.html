<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Screen Search</title>
</head>

<body style="font-family:sans-serif;text-align:center;margin-top:80px;">

<h2>Search Screen Code</h2>

<input id="codeInput" placeholder="Enter Screen Code">
<button onclick="searchCode()">Search</button>

<div id="result" style="margin-top:20px;"></div>

<script>

function searchCode(){

let code = document.getElementById("codeInput").value;

fetch("https://pb-n8n.planbmedia.co.th/webhook/search-screen?code=" + code)
.then(res => res.json())
.then(data => {

let html = "";

if(!data || data.length === 0){
document.getElementById("result").innerHTML = "No data found";
return;
}

data.forEach(d => {

html += `
<div style="margin-bottom:20px">
Code : ${d.CodeDGT}<br>
Name : ${d["ชื่อจอในAppendix"]}<br>
Type : ${d.TypeScreens}<br>
Format : ${d.Format3}<br>
Pixel : ${d.Pixel}<br>
Width : ${d["กว้าง(m)"]}<br>
Height : ${d["สูง(m)"]}
</div>
`;

});

document.getElementById("result").innerHTML = html;

})
.catch(err=>{
document.getElementById("result").innerHTML = "Error loading data";
});

}

</script>

</body>
</html>
